<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Rifas El Tecuan - Vento Gladiator 2.0</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --primary: #25d366; --gold: #ffd700; --bg: #0a0a0a; --card: #161616; }
        body { font-family: 'Arial Black', sans-serif; background: var(--bg); color: white; margin: 0; padding: 5px; padding-bottom: 100px; }
        .app { width: 100%; max-width: 450px; background: var(--card); border-radius: 25px; border: 1px solid #333; margin: auto; overflow: hidden; text-align: center; }
        
        .hero { background: linear-gradient(180deg, #1b4d2b 0%, #0a0a0a 100%); padding: 20px; border-bottom: 3px solid var(--primary); }
        .logo-img { width: 80px; margin-bottom: 10px; }
        .hero h1 { color: var(--gold); font-size: 18px; margin: 0; }
        .date-badge { background: #e74c3c; color: white; font-size: 11px; padding: 5px 12px; border-radius: 50px; margin-top: 8px; display: inline-block; }

        .promo-img { width: 85%; max-height: 200px; object-fit: contain; border-radius: 15px; margin: 10px auto; display: block; border: 1px solid #333; }
        .price-badge { background: white; color: black; padding: 5px 15px; border-radius: 50px; font-size: 16px; font-weight: bold; margin-bottom: 10px; display: inline-block; }

        /* VERIFICADOR */
        .verificador-box { background: #111; margin: 10px; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); }
        .verificador-box h3 { font-size: 14px; color: var(--gold); margin-top: 0; }
        .v-input-group { display: flex; gap: 5px; }
        .v-input-group input { flex: 1; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #000; color: white; font-size: 14px; }
        .btn-verificar { background: var(--gold); border: none; padding: 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 12px; }
        #resultado-verificador { font-size: 12px; margin-top: 10px; color: var(--primary); display: none; background: #000; padding: 8px; border-radius: 8px; }

        .search-area { background: #222; margin: 10px; padding: 15px; border-radius: 15px; }
        .input-group { display: flex; gap: 8px; }
        .input-group input { flex: 1; padding: 12px; border-radius: 10px; border: 2px solid #444; background: #000; color: white; font-size: 18px; text-align: center; }
        .btn-buscar { background: var(--gold); border: none; padding: 0 15px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .combos-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; margin: 10px; }
        .combo-card { background: #111; padding: 10px 2px; border-radius: 10px; border: 1px solid #444; cursor: pointer; font-size: 11px; }
        .combo-card b { display: block; color: var(--primary); font-size: 14px; }

        #carrito-lucky { display: none; background: #000; margin: 10px; padding: 12px; border-radius: 12px; border: 1px solid var(--primary); }
        .lucky-tags { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; margin-top: 8px; }
        .tag { background: var(--primary); color: black; padding: 4px 10px; border-radius: 5px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 5px; }

        .grid-header { font-size: 10px; color: #666; margin-bottom: 5px; }
        .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; height: 350px; overflow-y: auto; background: #000; padding: 10px; border-radius: 12px; margin: 10px; border: 1px solid #222; }
        .num { padding: 12px 0; background: #1e1e1e; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 12px; color: #aaa; }
        .num.selected { background: var(--primary) !important; color: black !important; }
        .num.apartado { background: #333; color: #555; cursor: not-allowed; }
        .num.pagado { background: #c0392b; color: white; opacity: 0.5; }
        
        .btn-flotante { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--primary); color: black; border: none; padding: 15px; border-radius: 40px; font-size: 15px; font-weight: bold; width: 80%; box-shadow: 0 5px 20px rgba(0,255,0,0.3); z-index: 1000; display: none; }

        #seccion-datos { display: none; padding: 20px; background: #1a1a1a; border-radius: 20px; margin: 10px; border: 1px solid #333; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #444; background: #000; color: white; font-size: 15px; box-sizing: border-box; }
        .btn-enviar { background: var(--primary); color: black; border: none; padding: 18px; width: 100%; border-radius: 12px; font-size: 16px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app">
        <div class="hero">
            <img src="Logo Rifas el tecuan.png" class="logo-img">
            <h1>VENTO GLADIATOR 2.0</h1>
            <div class="date-badge">📅 17 SEPTIEMBRE 2026</div>
        </div>

        <img src="Para rifas 17 Pro Max.jpeg" class="promo-img">
        <div class="price-badge">$50 x BOLETO</div>

        <div class="verificador-box">
            <h3>🔍 VERIFICADOR DE BOLETOS</h3>
            <div class="v-input-group">
                <input type="number" id="v-whatsapp" placeholder="Tu WhatsApp a 10 dígitos">
                <button class="btn-verificar" onclick="verificarBoletos()">VERIFICAR</button>
            </div>
            <div id="resultado-verificador"></div>
        </div>

        <div class="search-area">
            <div class="input-group">
                <input type="number" id="input-busqueda" placeholder="Busca tu número (0001-2500)">
                <button class="btn-buscar" onclick="buscarNumero()">BUSCAR</button>
            </div>
        </div>

        <div class="combos-container">
            <div class="combo-card" onclick="maquinaSuerte(1)"><span>1 BOLETO</span><b>$50</b></div>
            <div class="combo-card" onclick="maquinaSuerte(5)"><span>5 BOLETOS</span><b>$250</b></div>
            <div class="combo-card" onclick="maquinaSuerte(10)"><span>10 BOLETOS</span><b>$500</b></div>
        </div>

        <div id="carrito-lucky">
            <div id="tags-contenedor" class="lucky-tags"></div>
        </div>

        <div class="grid-header">LISTA DE BOLETOS (0001 - 2500)</div>
        <div id="grid" class="grid">Cargando lista completa...</div>

        <button class="btn-flotante" id="btn-flotante" onclick="irAlFormulario()">APARTAR MI SUERTE 🐯</button>

        <div id="seccion-datos">
            <h2 style="color: var(--gold); font-size: 16px;">COMPLETA TU REGISTRO</h2>
            <input type="text" id="nombre" placeholder="Nombre completo">
            <input type="number" id="whatsapp" placeholder="WhatsApp (10 dígitos)">
            <select id="estado">
                <option value="" disabled selected>Estado</option>
                <option value="Puebla">Puebla</option><option value="Oaxaca">Oaxaca</option>
                <option value="CDMX">CDMX</option><option value="Veracruz">Veracruz</option>
            </select>
            <input type="text" id="municipio" placeholder="Municipio">
            <button id="btn-final" class="btn-enviar" onclick="enviar()">CONFIRMAR APARTADO 🐯</button>
        </div>
    </div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxKuFUaEB0kd7QFttXIVLWI0ktIMKKEiDD2ZLoazfOzl0ZpQ-rUFM2KtFNhhpR25X0C5w/exec"; 
        let seleccionados = [];
        let apartadosRemotos = [];
        let pagadosRemotos = [];
        let baseDeDatosCompleta = []; // Para el verificador

        async function cargar() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            
            // CARGA LOS 2500 DE GOLPE
            for(let i=1; i <= 2500; i++) {
                let n = i.toString().padStart(4, '0');
                crearBoleto(n, grid);
            }

            try {
                const r = await fetch(SCRIPT_URL);
                const data = await r.json();
                apartadosRemotos = data.apartados || [];
                pagadosRemotos = data.pagados || [];
                baseDeDatosCompleta = data.raw || []; // Necesitas actualizar tu Apps Script para esto opcionalmente

                // Pintar estados
                apartadosRemotos.forEach(n => {
                    let el = document.getElementById("n-"+n);
                    if(el) el.className = 'num apartado';
                });
                pagadosRemotos.forEach(n => {
                    let el = document.getElementById("n-"+n);
                    if(el) el.className = 'num pagado';
                });
            } catch (e) { console.log("Conectado."); }
        }

        function crearBoleto(n, contenedor) {
            let div = document.createElement('div');
            div.innerText = n; div.id = "n-"+n;
            div.className = 'num';
            div.onclick = () => togg(n, div);
            contenedor.appendChild(div);
        }

        async function verificarBoletos() {
            const ws = document.getElementById('v-whatsapp').value;
            const res = document.getElementById('resultado-verificador');
            if(ws.length < 10) return alert("Ingresa un número válido.");
            
            res.style.display = "block";
            res.innerText = "Buscando tus boletos...";

            try {
                const r = await fetch(SCRIPT_URL + "?verificar=" + ws);
                const data = await r.json();
                if(data.encontrados && data.encontrados.length > 0) {
                    res.innerHTML = `✅ Hola <b>${data.nombre}</b>, tienes apartados: <br> ${data.encontrados.join(', ')}`;
                } else {
                    res.innerText = "❌ No se encontraron boletos con este número.";
                }
            } catch (e) { res.innerText = "Error al conectar con la base de datos."; }
        }

        async function buscarNumero() {
            let n = document.getElementById('input-busqueda').value.padStart(4, '0');
            if(parseInt(n) < 1 || parseInt(n) > 2500) return alert("Rango: 0001-2500");

            if(pagadosRemotos.includes(n) || apartadosRemotos.includes(n)) {
                return alert("Ese número ya está ocupado.");
            }

            if(!seleccionados.includes(n)) {
                seleccionados.push(n);
                let el = document.getElementById("n-"+n);
                if(el) { el.classList.add('selected'); el.scrollIntoView({behavior:'smooth', block:'center'}); }
                confetti({ particleCount: 30, spread: 30 });
            }
            actualizar();
        }

        function maquinaSuerte(cant) {
            let encontrados = 0;
            let bucle = 0;
            while(encontrados < cant && bucle < 500) {
                let azar = Math.floor(Math.random() * 2500 + 1).toString().padStart(4, '0');
                if(!apartadosRemotos.includes(azar) && !pagadosRemotos.includes(azar) && !seleccionados.includes(azar)) {
                    seleccionados.push(azar);
                    let el = document.getElementById("n-"+azar);
                    if(el) el.classList.add('selected');
                    encontrados++;
                }
                bucle++;
            }
            actualizar();
        }

        function togg(n, el) {
            if(el.classList.contains('apartado') || el.classList.contains('pagado')) return;
            if(seleccionados.includes(n)) { 
                seleccionados = seleccionados.filter(x => x !== n); 
                el.classList.remove('selected'); 
            } else { 
                seleccionados.push(n); 
                el.classList.add('selected'); 
            }
            actualizar();
        }

        function actualizar() {
            const carrito = document.getElementById('carrito-lucky');
            const contenedor = document.getElementById('tags-contenedor');
            const btnFlotante = document.getElementById('btn-flotante');
            contenedor.innerHTML = '';
            if(seleccionados.length > 0) {
                carrito.style.display = 'block';
                btnFlotante.style.display = (document.getElementById('seccion-datos').style.display === 'block') ? 'none' : 'block';
                seleccionados.forEach(n => {
                    const tag = document.createElement('div'); tag.className = 'tag';
                    tag.innerHTML = `${n} <span onclick="quitarNumero('${n}')">×</span>`;
                    contenedor.appendChild(tag);
                });
            } else { carrito.style.display = 'none'; btnFlotante.style.display = 'none'; }
        }

        function quitarNumero(n) {
            seleccionados = seleccionados.filter(x => x !== n);
            let el = document.getElementById("n-"+n);
            if(el) el.classList.remove('selected');
            actualizar();
        }

        function irAlFormulario() {
            document.getElementById('btn-flotante').style.display = 'none';
            document.getElementById('seccion-datos').style.display = 'block';
            document.getElementById('seccion-datos').scrollIntoView({ behavior: 'smooth' });
        }

        async function enviar() {
            const n = document.getElementById('nombre').value;
            const w = document.getElementById('whatsapp').value;
            const est = document.getElementById('estado').value;
            const mun = document.getElementById('municipio').value;
            if(!n || !w) return alert("Faltan datos.");
            
            const btn = document.getElementById('btn-final');
            btn.innerText = "🐯 REGISTRANDO..."; btn.disabled = true;

            fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ nombre:n, whatsapp:w, boletos: seleccionados.join(', '), estadoRep: est, municipio: mun }) });

            let total = seleccionados.length * 50;
            const msj = `📱 *RIFAS EL TECUAN* 🐯\n\n` +
                        `🏍️ *RIFA:* Vento Gladiator 2.0\n` +
                        `👤 *CLIENTE:* ${n}\n` +
                        `🔢 *BOLETOS:* ${seleccionados.join(', ')}\n` +
                        `💰 *TOTAL:* $${total} MXN\n` +
                        `*Pago en 6 horas.*`;
            
            setTimeout(() => { window.top.location.href = `https://api.whatsapp.com/send?phone=529531024519&text=${encodeURIComponent(msj)}`; }, 800);
        }

        cargar();
    </script>
</body>
</html>
